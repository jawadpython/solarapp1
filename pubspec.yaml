name: noor_energy
description: Tawfir Energy - Solar Application
publish_to: 'none'
version: 1.1.4+20

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # Firebase packages
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_functions: ^5.2.0
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.4.10
  url_launcher: ^6.3.2
  image_picker: ^1.1.2
  fl_chart: ^0.69.0  # Lightweight chart library for analytics
  intl: ^0.20.2  # Internationalization and date formatting (pinned by flutter_localizations)
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.2.2  # Local storage for language preference
  connectivity_plus: ^6.0.5  # Detect offline to show connect message
  # Export packages for admin dashboard
  excel: ^4.0.4
  csv: ^6.0.0
  pdf: ^3.11.1
  printing: ^5.13.3
  universal_html: ^2.2.4

  flutter_native_splash: ^2.4.0
  app_links: ^6.4.1
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/icon/app_icon_foreground.png
  min_sdk_android: 21
  remove_alpha_ios: true

flutter_native_splash:
  color: "#3A80BA"
  color_dark: "#1A1A2E"
  android_12:
    color: "#3A80BA"
    color_dark: "#1A1A2E"
  ios: true
  web: true
  fullscreen: true

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/data/regions.json
    - assets/data/regionSunHours.json
    - assets/data/moroccan_cities.json

