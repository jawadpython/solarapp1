<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Email verified — Tawfir Energy</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(160deg, #f0f7f4 0%, #e8eef5 100%);
      color: #1a1a1a;
    }
    .card {
      max-width: 420px;
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 8px 32px rgba(0,0,0,.08);
      text-align: center;
    }
    h1 { font-size: 1.35rem; margin: 0 0 12px; color: #0d6b4d; }
    p { margin: 0 0 14px; line-height: 1.55; color: #444; font-size: 0.95rem; }
    .muted { font-size: 0.85rem; color: #666; }
    .ok {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #e8f5ef;
      color: #0d6b4d;
      font-size: 28px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="ok" aria-hidden="true">✓</div>
    <h1>Email verified</h1>
    <p><strong>Thank you.</strong> Your email address is confirmed.</p>
    <p>Close this page and <strong>return to the Tawfir Energy app</strong>, then sign in if asked.</p>
    <p class="muted" dir="rtl">تم تأكيد بريدك الإلكتروني. أغلق هذه الصفحة وارجع إلى تطبيق توفير للطاقة.</p>
    <p class="muted">Votre e-mail est confirmé. Fermez cette page et rouvrez l’application Tawfir Energy.</p>
  </div>
  <script>
    (function () {
      try {
        setTimeout(function () {
          window.location.replace('com.tawfir.energy://auth?t=email_verified');
        }, 400);
      } catch (e) {}
    })();
  </script>
</body>
</html>
